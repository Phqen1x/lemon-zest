name: lemon-zest
adopt-info: lemon-zest
summary: AI-powered image editor using local Lemonade Server
description: |
  Lemon Zest lets you edit images using AI-powered inpainting
  with a local Lemonade Server. Simply select the area you 
  want to edit and let the AI seamlessly apply the desired change.
base: core24
confinement: strict
grade: stable
icon: icon.png
contact: https://github.com/phqen1x/lemon-zest/issues
issues: https://github.com/phqen1x/lemon-zest/issues
website: https://github.com/phqen1x/lemon-zest
license: MIT
platforms:
  amd64:


plugs:
  shmem:
    interface: shared-memory
    private: true

apps:
  lemon-zest:
    command: lemon-zest/lemon-zest --no-sandbox
    extensions: [gnome]
    plugs:
      - network
      - home
      - removable-media
      - shmem

parts:
  lemon-zest:
    plugin: npm
    source: .
    npm-include-node: true
    npm-node-version: "20.11.1"
    build-packages:
      - unzip
      - git
    override-pull: |
      craftctl default
      VERSION=$(craftctl get version)
      if [ -z "$VERSION" ]; then
        VERSION=$(git describe --tags --abbrev=10 2>/dev/null || grep '"version"' package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
        craftctl set version=$VERSION
      fi
    override-build: |
      craftctl default
      npm install
      npx electron-builder --linux dir
      mkdir -p $CRAFT_PART_INSTALL/lemon-zest
      cp -a dist/linux-unpacked/* $CRAFT_PART_INSTALL/lemon-zest/
    prime:
      - -*/chrome-sandbox
      - -*/resources/app.asar.unpacked/node_modules/sharp/vendor/lib
      - -*/resources/app.asar.unpacked/node_modules/sharp/vendor/include
